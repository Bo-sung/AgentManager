<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg-0:#0a0e12;
  --bg-1:#0d131a;
  --bg-2:#10171f;
  --bg-3:#161f29;
  --bg-4:#1d2832;
  --bg-5:#26333f;
  --line:#22303b;
  --line-soft:#1a242d;
  --line-bright:#33444f;
  --txt-0:#dbe3ea;
  --txt-1:#92a2 ;
  --txt-1:#90a0ac;
  --txt-2:#5e6e7a;
  --txt-3:#43525c;
  --accent:#ff5a2c;
  --accent-bright:#ff7048;
  --accent-dim:rgba(255,90,44,.14);
  --accent-line:rgba(255,90,44,.40);
  --run:#ff5a2c;
  --warn:#f5b531;
  --ok:#34d3a6;
  --err:#ff4d5e;
  --info:#5b9bff;
  --add:#2fae7a;
  --add-bg:rgba(47,174,122,.10);
  --del:#e05566;
  --del-bg:rgba(224,85,102,.09);
  --r-sm:4px;
  --r-md:7px;
  --r-lg:10px;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --rail-w:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg-0);
  color:var(--txt-0);
  font-size:13px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
#root{height:100vh}

/* ---------- HUD primitives ---------- */
.mono{font-family:var(--mono)}
.lbl{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--txt-2);
  font-weight:500;
}
.code-chip{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.08em;
  color:var(--accent);
}

/* corner ticks decoration */
.ticks{position:relative}
.ticks::before,.ticks::after{
  content:'';position:absolute;width:6px;height:6px;pointer-events:none;
  border-color:var(--line-bright);border-style:solid;
}
.ticks::before{top:0;left:0;border-width:1px 0 0 1px}
.ticks::after{bottom:0;right:0;border-width:0 1px 1px 0}

/* scrollbars */
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:var(--bg-5);background-clip:padding-box}

/* ---------- App shell ---------- */
.app{height:100vh;display:flex;flex-direction:column;background:var(--bg-1)}

/* titlebar */
.titlebar{
  height:34px;flex:0 0 34px;display:flex;align-items:center;
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
  border-bottom:1px solid var(--line-soft);
  padding-left:14px;gap:2px;user-select:none;position:relative;
}
.titlebar::after{
  content:'';position:absolute;left:0;top:0;height:2px;width:120px;
  background:linear-gradient(90deg,var(--accent),transparent);
}
.tb-brand{display:flex;align-items:center;gap:8px;margin-right:18px}
.tb-logo{width:15px;height:15px;display:grid;place-items:center}
.tb-name{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--txt-0)}
.tb-name b{color:var(--accent)}
.tb-menu{display:flex;gap:2px}
.tb-menu button{
  background:none;border:0;color:var(--txt-1);font-family:var(--sans);font-size:12.5px;
  padding:3px 9px;border-radius:var(--r-sm);cursor:pointer;
}
.tb-menu button:hover{background:var(--bg-3);color:var(--txt-0)}
.tb-menu button.open{background:var(--bg-3);color:var(--txt-0)}
.tb-menu-wrap{position:relative}
.tb-dropdown{position:absolute;top:28px;left:2px;min-width:230px}
.menu-item .kbd{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--txt-3);letter-spacing:.04em}
.tb-spacer{flex:1}
.tb-stat{
  display:flex;align-items:center;gap:14px;margin-right:16px;font-family:var(--mono);
  font-size:10px;letter-spacing:.08em;color:var(--txt-2);
}
.tb-stat .s{display:flex;align-items:center;gap:5px}
.tb-win{display:flex;height:100%}
.tb-win button{
  width:44px;height:100%;background:none;border:0;color:var(--txt-2);cursor:pointer;
  display:grid;place-items:center;
}
.tb-win button:hover{background:var(--bg-3);color:var(--txt-0)}
.tb-win button.close:hover{background:#c0303d;color:#fff}

.body{flex:1;display:flex;min-height:0}

/* ---------- Sidebar ---------- */
.rail{
  width:var(--rail-w);flex:0 0 var(--rail-w);background:var(--bg-2);
  border-right:1px solid var(--line-soft);display:flex;flex-direction:column;min-height:0;
}
.rail-top{padding:12px 12px 8px}
.btn-new{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#1a0c06;border:0;border-radius:var(--r-md);
  font-family:var(--sans);font-weight:600;font-size:12.5px;letter-spacing:.01em;
  padding:9px 12px;cursor:pointer;position:relative;overflow:hidden;white-space:nowrap;
}
.btn-new:hover{background:var(--accent-bright)}
.btn-new svg{stroke:#1a0c06}

.rail-nav{padding:4px 8px;display:flex;flex-direction:column;gap:1px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--r-sm);
  color:var(--txt-1);cursor:pointer;font-size:12.5px;position:relative;
}
.nav-item:hover{background:var(--bg-3);color:var(--txt-0)}
.nav-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.nav-item.active{background:var(--bg-3);color:var(--txt-0)}
.nav-item.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:2px;background:var(--accent);border-radius:2px}
.nav-item svg{stroke:currentColor;opacity:.85}
.nav-item .ct{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--txt-2)}

.rail-scroll{flex:1;overflow-y:auto;min-height:0;padding-bottom:8px}
.sec-head{
  display:flex;align-items:center;gap:8px;padding:14px 14px 6px;
}
.sec-head .lbl{flex-shrink:0}
.sec-head .rule{flex:1;height:1px;background:var(--line-soft)}
.sec-head .cnt{font-family:var(--mono);font-size:10px;color:var(--txt-2)}

/* session row */
.ses{
  display:flex;gap:9px;padding:8px 12px 8px 10px;margin:0 6px;border-radius:var(--r-md);
  cursor:pointer;position:relative;border:1px solid transparent;
}
.ses:hover{background:var(--bg-3)}
.ses.active{background:var(--bg-3);border-color:var(--line)}
.ses.active::before{content:'';position:absolute;left:-6px;top:9px;bottom:9px;width:2px;background:var(--accent);border-radius:2px}
.ses-badge{
  width:26px;height:26px;flex:0 0 26px;border-radius:var(--r-sm);display:grid;place-items:center;
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.02em;
  border:1px solid var(--line-bright);background:var(--bg-1);color:var(--txt-1);position:relative;
}
.ses-main{flex:1;min-width:0}
.ses-title{font-size:12.5px;color:var(--txt-0);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ses.dim .ses-title{color:var(--txt-1)}
.ses-meta{display:flex;align-items:center;gap:7px;margin-top:3px;font-family:var(--mono);font-size:10px;color:var(--txt-2)}
.ses-branch{display:flex;align-items:center;gap:3px;min-width:0;overflow:hidden}
.ses-branch span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ses-time{margin-left:auto;flex-shrink:0}
.ses-act{
  margin-top:5px;font-family:var(--mono);font-size:10px;color:var(--accent);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;
}

/* status dot */
.dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px;position:relative}
.dot.running{background:var(--run);box-shadow:0 0 0 0 rgba(255,90,44,.5);animation:pulse 1.6s infinite}
.dot.waiting{background:var(--warn)}
.dot.done{background:var(--ok)}
.dot.error{background:var(--err)}
.dot.idle{background:var(--txt-3)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,44,.45)}70%{box-shadow:0 0 0 5px rgba(255,90,44,0)}100%{box-shadow:0 0 0 0 rgba(255,90,44,0)}}

.spin{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--accent-dim);border-top-color:var(--accent);animation:spin .7s linear infinite;flex:0 0 11px}
@keyframes spin{to{transform:rotate(360deg)}}

.rail-foot{
  border-top:1px solid var(--line-soft);padding:8px;display:flex;align-items:center;gap:10px;
}
.rail-foot .nav-item{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:var(--r-sm)}
.user-chip:hover{background:var(--bg-3)}
.avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#33444f,#1d2832);border:1px solid var(--line-bright);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--txt-0)}

/* ---------- Main pane ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-1);position:relative}

.tabbar{
  height:44px;flex:0 0 44px;display:flex;align-items:center;gap:12px;padding:0 14px;
  border-bottom:1px solid var(--line-soft);background:var(--bg-1);
}
.crumb{display:flex;align-items:center;gap:8px;min-width:0}
.crumb .proj{font-family:var(--mono);font-size:11px;color:var(--txt-2)}
.crumb .sep{color:var(--txt-3)}
.crumb .ttl{font-size:13px;font-weight:600;color:var(--txt-0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
.branch-chip{
  display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;color:var(--txt-1);
  background:var(--bg-3);border:1px solid var(--line);padding:3px 8px;border-radius:20px;
}
.branch-chip svg{stroke:var(--txt-2)}
.tab-spacer{flex:1}
.tabbtn{
  display:flex;align-items:center;gap:7px;background:var(--bg-3);border:1px solid var(--line);
  color:var(--txt-1);font-family:var(--sans);font-size:12px;padding:6px 11px;border-radius:var(--r-md);cursor:pointer;white-space:nowrap;
}
.tabbtn:hover{border-color:var(--line-bright);color:var(--txt-0)}
.tabbtn.accent{color:var(--accent);border-color:var(--accent-line)}
.tabbtn.accent svg{stroke:var(--accent)}
.icobtn{width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--line);background:var(--bg-3);border-radius:var(--r-md);color:var(--txt-1);cursor:pointer}
.icobtn:hover{color:var(--txt-0);border-color:var(--line-bright)}
.icobtn.on{color:var(--accent);border-color:var(--accent-line)}

/* status strip */
.strip{
  height:32px;flex:0 0 32px;display:flex;align-items:center;gap:16px;padding:0 16px;
  background:var(--bg-2);border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;
}
.strip .st{display:flex;align-items:center;gap:7px;color:var(--txt-2)}
.strip .st b{color:var(--txt-1);font-weight:500}
.strip .st .v{color:var(--txt-0)}
.strip-run{color:var(--accent)!important}
.strip .div{width:1px;height:14px;background:var(--line)}
.strip-right{margin-left:auto;display:flex;align-items:center;gap:16px}

/* transcript */
.scroll{flex:1;overflow-y:auto;min-height:0}
.thread{max-width:1240px;margin:0 auto;padding:24px 48px 40px}

.msg-user{display:flex;justify-content:flex-end;margin:18px 0}
.bubble{
  background:var(--bg-3);border:1px solid var(--line);border-radius:10px 10px 2px 10px;
  padding:11px 14px;max-width:62%;font-size:13px;color:var(--txt-0);line-height:1.55;white-space:pre-wrap;
}
.bubble .b-head{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--txt-2);margin-bottom:5px;text-transform:uppercase}

.msg-agent{margin:16px 0;display:flex;gap:12px}
.ag-rail{flex:0 0 28px;display:flex;flex-direction:column;align-items:center;gap:6px}
.ag-mark{width:28px;height:28px;border-radius:var(--r-sm);border:1px solid var(--line-bright);background:var(--bg-2);display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent)}
.ag-line{flex:1;width:1px;background:var(--line-soft)}
.ag-body{flex:1;min-width:0;padding-top:2px}
.ag-name{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:nowrap}
.ag-name .n{font-size:12px;font-weight:600;color:var(--txt-0);white-space:nowrap}
.ag-name .m{font-family:var(--mono);font-size:10px;color:var(--txt-2)}
.prose{font-size:13px;color:var(--txt-0);line-height:1.62}
.prose p{margin:0 0 9px}
.prose p:last-child{margin-bottom:0}
.prose strong{color:#fff;font-weight:600}
.prose code{font-family:var(--mono);font-size:11.5px;background:var(--bg-3);border:1px solid var(--line-soft);padding:1px 5px;border-radius:4px;color:var(--accent-bright)}
.prose ul{margin:4px 0 9px;padding-left:4px;list-style:none}
.prose li{position:relative;padding-left:18px;margin:3px 0}
.prose li::before{content:'';position:absolute;left:3px;top:8px;width:5px;height:1px;background:var(--accent)}

/* tool card */
.tool{
  border:1px solid var(--line);border-radius:var(--r-md);margin:10px 0;overflow:hidden;background:var(--bg-2);
}
.tool-h{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;background:var(--bg-2)}
.tool-h:hover{background:var(--bg-3)}
.tool-ico{width:18px;height:18px;display:grid;place-items:center;color:var(--txt-1)}
.tool-kind{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-2)}
.tool-name{font-family:var(--mono);font-size:11.5px;color:var(--txt-0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-stat{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--txt-2)}
.tool-body{border-top:1px solid var(--line-soft);padding:10px 12px;background:var(--bg-1);font-family:var(--mono);font-size:11px;color:var(--txt-1);line-height:1.7;white-space:pre-wrap;max-height:220px;overflow:auto}
.tool-body .ln{color:var(--txt-2)}
.tool-body .out{color:var(--ok)}

/* file change / review card */
.fc{
  display:flex;align-items:center;gap:14px;margin:12px 0;padding:11px 14px;
  border:1px solid var(--line);border-radius:var(--r-md);background:var(--bg-2);position:relative;
}
.fc::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;background:var(--accent);border-radius:2px}
.fc-ico{color:var(--txt-1)}
.fc-txt{font-size:12.5px;color:var(--txt-0)}
.fc-add{color:var(--add);font-family:var(--mono);font-size:11.5px;font-weight:500}
.fc-del{color:var(--del);font-family:var(--mono);font-size:11.5px;font-weight:500}
.fc-files{font-family:var(--mono);font-size:10px;color:var(--txt-2);margin-top:2px}
.fc-spacer{flex:1}
.fc-btn{
  display:flex;align-items:center;gap:7px;background:var(--accent-dim);border:1px solid var(--accent-line);
  color:var(--accent);font-family:var(--sans);font-weight:600;font-size:12px;padding:6px 13px;border-radius:var(--r-md);cursor:pointer;
}
.fc-btn:hover{background:var(--accent);color:#1a0c06}
.fc-btn:hover svg{stroke:#1a0c06}

/* msg actions */
.msg-actions{display:flex;gap:4px;margin:4px 0 2px 40px}
.msg-actions button{width:28px;height:28px;display:grid;place-items:center;border:0;background:none;color:var(--txt-3);border-radius:var(--r-sm);cursor:pointer}
.msg-actions button:hover{background:var(--bg-3);color:var(--txt-1)}

/* typing cursor */
.cursor{display:inline-block;width:7px;height:14px;background:var(--accent);margin-left:2px;vertical-align:-2px;animation:blink 1s steps(2) infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.working-line{display:flex;align-items:center;gap:9px;margin:12px 0 4px;font-family:var(--mono);font-size:11px;color:var(--accent)}

/* waiting / approval prompt */
.approve{
  border:1px solid var(--warn);border-radius:var(--r-md);margin:12px 0;background:rgba(245,181,49,.06);overflow:hidden;
}
.approve-h{display:flex;align-items:center;gap:9px;padding:10px 13px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--warn)}
.approve-b{padding:0 13px 12px;font-size:12.5px;color:var(--txt-0)}
.approve-cmd{font-family:var(--mono);font-size:11.5px;background:var(--bg-1);border:1px solid var(--line);padding:8px 11px;border-radius:var(--r-sm);margin:9px 0;color:var(--txt-0);white-space:pre-wrap}
.approve-btns{display:flex;gap:8px;margin-top:4px}
.btn-approve{background:var(--ok);color:#06160f;border:0;font-weight:600;font-size:12px;padding:7px 15px;border-radius:var(--r-md);cursor:pointer;font-family:var(--sans)}
.btn-approve:hover{filter:brightness(1.1)}
.btn-reject{background:var(--bg-3);color:var(--txt-1);border:1px solid var(--line);font-weight:500;font-size:12px;padding:7px 15px;border-radius:var(--r-md);cursor:pointer;font-family:var(--sans)}
.btn-reject:hover{border-color:var(--err);color:var(--err)}

/* error block */
.errblk{border:1px solid rgba(255,77,94,.4);border-radius:var(--r-md);margin:12px 0;background:rgba(255,77,94,.05);padding:11px 13px}
.errblk-h{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--err);margin-bottom:6px}
.errblk-b{font-family:var(--mono);font-size:11px;color:var(--txt-1);line-height:1.6;white-space:pre-wrap}

/* ---------- Composer ---------- */
.composer{padding:0 48px 18px;max-width:1240px;margin:0 auto;width:100%}
.comp-box{
  background:var(--bg-3);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;
  transition:border-color .15s;
}
.comp-box.focus{border-color:var(--accent-line)}
.comp-input{
  width:100%;background:none;border:0;resize:none;color:var(--txt-0);font-family:var(--sans);font-size:13.5px;
  padding:13px 15px 4px;line-height:1.5;outline:none;max-height:160px;min-height:46px;
}
.comp-input::placeholder{color:var(--txt-2)}
.comp-bar{display:flex;align-items:center;gap:8px;padding:7px 9px 8px}
.comp-bar .c-ico{width:30px;height:30px;display:grid;place-items:center;border-radius:var(--r-sm);color:var(--txt-1);cursor:pointer;border:0;background:none}
.comp-bar .c-ico:hover{background:var(--bg-4);color:var(--txt-0)}
.comp-pill{
  display:flex;align-items:center;gap:6px;background:var(--bg-1);border:1px solid var(--line);border-radius:20px;
  padding:5px 10px;font-family:var(--mono);font-size:10.5px;color:var(--txt-1);cursor:pointer;
}
.comp-pill:hover{border-color:var(--line-bright);color:var(--txt-0)}
.comp-pill svg{stroke:var(--txt-2)}
.comp-pill.model b{color:var(--accent);font-weight:600}
.comp-spacer{flex:1}
.send{
  width:32px;height:32px;border-radius:var(--r-md);background:var(--accent);border:0;display:grid;place-items:center;cursor:pointer;
}
.send:hover{background:var(--accent-bright)}
.send:disabled{background:var(--bg-4);cursor:default}
.send svg{stroke:#1a0c06}
.send:disabled svg{stroke:var(--txt-3)}
.comp-hint{display:flex;justify-content:space-between;padding:6px 4px 0;font-family:var(--mono);font-size:9.5px;color:var(--txt-3);letter-spacing:.04em}

/* ---------- Review drawer ---------- */
.review{
  width:0;flex:0 0 0;overflow:hidden;background:var(--bg-2);border-left:1px solid var(--line-soft);
  display:flex;flex-direction:column;transition:flex-basis .22s ease,width .22s ease;
}
.review.open{width:420px;flex:0 0 420px}
.rv-head{height:44px;flex:0 0 44px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line-soft)}
.rv-head .t{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-0)}
.rv-head .code-chip{margin-left:2px}
.rv-files{padding:10px;border-bottom:1px solid var(--line-soft);display:flex;flex-direction:column;gap:2px}
.rv-file{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--r-sm);cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--txt-1)}
.rv-file:hover{background:var(--bg-3)}
.rv-file.active{background:var(--bg-3);color:var(--txt-0)}
.rv-file .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rv-file .ch{font-family:var(--mono);font-size:10px}
.rv-diff{flex:1;overflow:auto;font-family:var(--mono);font-size:11.5px;line-height:1.65}
.dl{display:flex;padding:0 4px;white-space:pre}
.dl .gut{width:42px;flex:0 0 42px;text-align:right;padding-right:10px;color:var(--txt-3);user-select:none}
.dl .c{flex:1;padding-left:10px;color:var(--txt-1)}
.dl.add{background:var(--add-bg)}
.dl.add .c{color:#7fe0b6}
.dl.add .gut{color:var(--add)}
.dl.del{background:var(--del-bg)}
.dl.del .c{color:#ea97a1}
.dl.del .gut{color:var(--del)}
.dl.hunk{background:var(--bg-3);color:var(--info)}
.dl.hunk .c{color:var(--info)}
.rv-foot{flex:0 0 auto;border-top:1px solid var(--line-soft);padding:10px 12px;display:flex;gap:8px}
.rv-foot button{flex:1;font-family:var(--sans);font-size:12px;font-weight:600;padding:8px;border-radius:var(--r-md);cursor:pointer;border:1px solid var(--line)}
.rv-keep{background:var(--add);color:#06160f;border-color:transparent}
.rv-keep:hover{filter:brightness(1.1)}
.rv-discard{background:var(--bg-3);color:var(--txt-1)}
.rv-discard:hover{border-color:var(--err);color:var(--err)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,8,11,.62);backdrop-filter:blur(2px);display:grid;place-items:center;z-index:50;animation:fade .15s}
@keyframes fade{from{opacity:0}}
.modal{
  width:540px;background:var(--bg-2);border:1px solid var(--line-bright);border-radius:var(--r-lg);
  box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;animation:rise .2s ease;
}
@keyframes rise{from{transform:translateY(10px);opacity:0}}
.modal-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-soft)}
.modal-h .lbl{color:var(--accent)}
.modal-h>span{white-space:nowrap}
.modal-h .x{margin-left:auto;width:28px;height:28px;display:grid;place-items:center;border-radius:var(--r-sm);color:var(--txt-2);cursor:pointer;border:0;background:none}
.modal-h .x:hover{background:var(--bg-3);color:var(--txt-0)}
.modal-b{padding:18px}
.field{margin-bottom:16px}
.field>.lbl{display:block;margin-bottom:8px}
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.agent-opt{
  border:1px solid var(--line);border-radius:var(--r-md);padding:13px 11px;cursor:pointer;background:var(--bg-1);
  display:flex;flex-direction:column;gap:8px;transition:.12s;
}
.agent-opt:hover{border-color:var(--line-bright)}
.agent-opt.sel{border-color:var(--accent);background:var(--accent-dim)}
.agent-opt .badge{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--line-bright);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:11px;color:var(--accent)}
.agent-opt .nm{font-size:12.5px;font-weight:600;color:var(--txt-0)}
.agent-opt .ds{font-family:var(--mono);font-size:9.5px;color:var(--txt-2);letter-spacing:.04em}
.modal-input{
  width:100%;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);
  color:var(--txt-0);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;
}
.modal-input:focus{border-color:var(--accent-line)}
.modal-input::placeholder{color:var(--txt-2)}
.modal-row{display:flex;gap:10px}
.modal-row .field{flex:1}
.select-pill{
  display:flex;align-items:center;gap:8px;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);
  padding:9px 12px;font-family:var(--mono);font-size:11px;color:var(--txt-0);cursor:pointer;
}
.modal-f{display:flex;justify-content:flex-end;gap:9px;padding:14px 18px;border-top:1px solid var(--line-soft);background:var(--bg-1)}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--txt-1);font-size:12.5px;font-weight:500;padding:8px 16px;border-radius:var(--r-md);cursor:pointer;font-family:var(--sans)}
.btn-ghost:hover{border-color:var(--line-bright);color:var(--txt-0)}
.btn-primary{background:var(--accent);border:0;color:#1a0c06;font-size:12.5px;font-weight:600;padding:8px 18px;border-radius:var(--r-md);cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:7px;white-space:nowrap}
.btn-primary:hover{background:var(--accent-bright)}
.btn-primary svg{stroke:#1a0c06}

/* dropdown menu */
.menu{
  position:absolute;background:var(--bg-3);border:1px solid var(--line-bright);border-radius:var(--r-md);
  box-shadow:0 14px 36px rgba(0,0,0,.45);padding:5px;z-index:60;min-width:200px;animation:rise .14s ease;
}
.menu-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:12.5px;color:var(--txt-1)}
.menu-item:hover{background:var(--bg-4);color:var(--txt-0)}
.menu-item.sel{color:var(--accent)}
.menu-item .mn-code{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--txt-3)}
.menu-sep{height:1px;background:var(--line-soft);margin:4px 6px}

.empty{flex:1;display:grid;place-items:center;color:var(--txt-2);font-family:var(--mono);font-size:12px}

/* ---------- Settings view ---------- */
.set-head{height:44px;flex:0 0 44px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line-soft)}
.set-head .ttl{font-size:13px;font-weight:600;color:var(--txt-0);white-space:nowrap}
.set-head .lbl{margin-left:2px}
.set-scroll{flex:1;overflow-y:auto;min-height:0}
.set-toc{
  position:sticky;top:0;z-index:2;display:flex;gap:4px;padding:10px 0 10px;margin:0 auto;max-width:760px;
  background:linear-gradient(180deg,var(--bg-1) 70%,transparent);
}
.set-toc button{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-2);
  background:none;border:1px solid transparent;border-radius:20px;padding:6px 12px;cursor:pointer;
}
.set-toc button:hover{color:var(--txt-0)}
.set-toc button.on{color:var(--accent);border-color:var(--accent-line);background:var(--accent-dim)}
.set-page{max-width:760px;margin:0 auto;padding:4px 28px 60px}
.set-section{margin-top:30px}
.set-section:first-child{margin-top:6px}
.set-sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.set-sec-head .h{font-size:14px;font-weight:600;color:var(--txt-0);white-space:nowrap}
.set-sec-head .num{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.1em}
.set-sec-head .rule{flex:1;height:1px;background:var(--line-soft)}
.set-card{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--bg-2);overflow:hidden}
.set-card + .set-card{margin-top:12px}
.set-row{display:flex;align-items:center;gap:18px;padding:14px 16px}
.set-row + .set-row{border-top:1px solid var(--line-soft)}
.set-meta{flex:1;min-width:0}
.set-t{font-size:13px;color:var(--txt-0);font-weight:500}
.set-d{font-size:11.5px;color:var(--txt-2);margin-top:2px;line-height:1.45}
.set-d code{font-family:var(--mono);font-size:10.5px;color:var(--accent-bright);background:var(--bg-1);padding:1px 5px;border-radius:4px;border:1px solid var(--line-soft)}
.set-ctl{flex:0 0 auto;display:flex;align-items:center;gap:10px}

/* runtime card header */
.rt-head{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg-3);border-bottom:1px solid var(--line-soft)}
.rt-badge{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--line-bright);background:var(--bg-1);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:12px;color:var(--accent)}
.rt-name{font-size:13px;font-weight:600;color:var(--txt-0)}
.rt-sub{font-family:var(--mono);font-size:10px;color:var(--txt-2);letter-spacing:.04em;margin-top:1px}
.rt-ver{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--ok);background:rgba(52,211,166,.08);border:1px solid rgba(52,211,166,.25);padding:3px 9px;border-radius:20px}
.rt-ver.off{color:var(--txt-2);background:var(--bg-1);border-color:var(--line)}

/* toggle */
.tgl{width:38px;height:21px;border-radius:20px;background:var(--bg-4);border:1px solid var(--line-bright);position:relative;cursor:pointer;padding:0;transition:.16s;flex:0 0 38px}
.tgl .knob{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--txt-2);transition:.16s}
.tgl.on{background:var(--accent-dim);border-color:var(--accent-line)}
.tgl.on .knob{left:19px;background:var(--accent)}

/* segmented */
.seg{display:flex;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);padding:2px;gap:2px}
.seg button{font-family:var(--sans);font-size:11.5px;color:var(--txt-1);background:none;border:0;padding:6px 12px;border-radius:5px;cursor:pointer;white-space:nowrap}
.seg button:hover{color:var(--txt-0)}
.seg button.sel{background:var(--bg-4);color:var(--txt-0);box-shadow:0 1px 2px rgba(0,0,0,.3)}
.seg button.sel.warn{color:var(--warn)}

/* text + select controls */
.set-input{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);color:var(--txt-0);font-family:var(--mono);font-size:11.5px;padding:8px 11px;outline:none;width:280px}
.set-input:focus{border-color:var(--accent-line)}
.set-input.key{letfor-spacing:.1em}

/* subscription account */
.set-row.col{flex-direction:column;align-items:stretch;gap:12px}
.acct-card{display:flex;align-items:center;gap:13px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--bg-1);padding:12px 14px}
.acct-av{width:38px;height:38px;flex:0 0 38px;border-radius:var(--r-sm);border:1px solid var(--line-bright);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:13px;color:var(--accent);background:var(--bg-2)}
.acct-info{flex:1;min-width:0}
.acct-row1{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.acct-row1 b{font-size:13px;color:var(--txt-0);font-weight:600}
.ok-chip{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ok);background:rgba(52,211,166,.08);border:1px solid rgba(52,211,166,.25);padding:2px 7px;border-radius:20px}
.acct-row2{font-family:var(--mono);font-size:10.5px;color:var(--txt-2);margin-top:5px}
.acct-usage{margin-top:9px}
.acct-bar{height:4px;border-radius:3px;background:var(--bg-4);overflow:hidden;margin-top:5px;max-width:280px}
.acct-bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
.acct-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.plan-badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-line);padding:2px 8px;border-radius:20px}
.acct-empty{display:flex;align-items:center;gap:14px;border:1px dashed var(--line-bright);border-radius:var(--r-md);background:var(--bg-1);padding:13px 14px}
.acct-empty .txt{flex:1;font-size:12px;color:var(--txt-2);line-height:1.45}
.acct-link-btn{display:flex;align-items:center;gap:8px;background:var(--accent-dim);border:1px solid var(--accent-line);color:var(--accent);font-family:var(--sans);font-weight:600;font-size:12px;padding:9px 15px;border-radius:var(--r-md);cursor:pointer;white-space:nowrap}
.acct-link-btn:hover{background:var(--accent);color:#1a0c06}
.acct-link-btn:hover svg{stroke:#1a0c06}
.unlink-btn{background:var(--bg-3);border:1px solid var(--line);color:var(--txt-1);font-family:var(--sans);font-size:11.5px;font-weight:500;padding:6px 12px;border-radius:var(--r-sm);cursor:pointer}
.unlink-btn:hover{border-color:var(--err);color:var(--err)}

/* link-account modal */
.prov-head{display:flex;align-items:center;gap:14px;padding:2px 0 16px}
.prov-badge{width:46px;height:46px;border-radius:var(--r-md);border:1px solid var(--line-bright);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:16px;color:var(--accent);background:var(--bg-1)}
.prov-head .pn{font-size:14px;font-weight:600;color:var(--txt-0)}
.prov-head .ps{font-family:var(--mono);font-size:10.5px;color:var(--txt-2);margin-top:2px}
.scope-list{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin-top:6px}
.scope-item{display:flex;align-items:center;gap:11px;padding:11px 13px;font-size:12px;color:var(--txt-1)}
.scope-item+.scope-item{border-top:1px solid var(--line-soft)}
.scope-item svg{stroke:var(--ok);flex:0 0 auto}
.scope-item.no svg{stroke:var(--txt-3)}
.scope-item.no{color:var(--txt-2)}
.oauth-note{font-family:var(--mono);font-size:10px;color:var(--txt-3);margin-top:13px;line-height:1.5;display:flex;gap:7px;align-items:flex-start}
.oauth-note svg{stroke:var(--txt-3);flex:0 0 auto;margin-top:1px}

/* ---------- Worker delegation ---------- */
/* worker selection list */
.wk-list{display:flex;flex-direction:column;gap:7px}
.wk-row{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--bg-1);padding:10px 12px;cursor:pointer;transition:border-color .12s,background .12s;position:relative}
.wk-row:hover{border-color:var(--line-bright)}
.wk-row.sel{background:var(--bg-3)}
.wk-row.busy{opacity:.5;cursor:not-allowed}
.wk-row.busy:hover{border-color:var(--line)}
.wk-badge{width:30px;height:30px;flex:0 0 30px;border-radius:var(--r-sm);border:1px solid var(--line-bright);background:var(--bg-2);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:11px}
.wk-meta{flex:1;min-width:0}
.wk-name-row{display:flex;align-items:center;gap:8px}
.wk-name{font-size:12.5px;font-weight:600;color:var(--txt-0)}
.wk-model{font-family:var(--mono);font-size:10px;color:var(--txt-2);margin-top:2px}
.wk-tags{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.st-chip{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--line)}
.st-chip.idle{color:var(--ok);border-color:rgba(52,211,166,.3);background:rgba(52,211,166,.06)}
.st-chip.busy{color:var(--run);border-color:var(--accent-line);background:var(--accent-dim)}
.tr-chip{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:.06em;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--txt-2);background:var(--bg-2)}
.tr-chip.on{color:var(--info);border-color:rgba(91,155,255,.3);background:rgba(91,155,255,.06)}
.wk-check{width:18px;height:18px;flex:0 0 18px;border-radius:50%;border:1.5px solid var(--line-bright);display:grid;place-items:center;color:transparent}
.wk-row.sel .wk-check{border-color:transparent}
/* add-new dashed row */
.wk-add{display:flex;align-items:center;gap:10px;border:1px dashed var(--line-bright);border-radius:var(--r-md);background:none;padding:11px 12px;cursor:pointer;color:var(--txt-1);font-size:12.5px}
.wk-add:hover{border-color:var(--accent-line);color:var(--accent)}
.wk-add.open{border-style:solid;border-color:var(--accent-line);color:var(--accent);background:var(--accent-dim)}
.wk-add .ic{width:30px;height:30px;flex:0 0 30px;border-radius:var(--r-sm);border:1px dashed currentColor;display:grid;place-items:center}
/* create-worker form */
.wk-form{border:1px solid var(--line);border-top:0;border-radius:0 0 var(--r-md) var(--r-md);background:var(--bg-1);padding:14px;margin-top:-3px;display:flex;flex-direction:column;gap:13px}
.wk-form .agent-grid{grid-template-columns:repeat(3,1fr)}
.wk-form .agent-opt{padding:10px 9px}
.tr-policy{border:1px solid var(--line);border-radius:var(--r-md);background:var(--bg-2);padding:11px 12px}
.tr-policy-head{display:flex;align-items:center;gap:10px}
.tr-policy-head .t{font-size:12px;color:var(--txt-0);font-weight:500;flex:1;display:flex;align-items:center;gap:7px}
.tr-langs{display:flex;align-items:center;gap:9px;margin-top:11px}
.tr-langs .arrow{color:var(--txt-2)}
.tr-cap{font-family:var(--mono);font-size:9.5px;color:var(--txt-3);margin-top:9px;display:flex;align-items:center;gap:6px;letter-spacing:.03em}
.fix-cap{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;color:var(--txt-3);letter-spacing:.03em;margin-top:7px}
/* textarea in modal */
.modal-area{width:100%;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);color:var(--txt-0);font-family:var(--sans);font-size:13px;line-height:1.55;padding:11px 13px;outline:none;resize:vertical;min-height:96px}
.modal-area:focus{border-color:var(--accent-line)}
.modal-area::placeholder{color:var(--txt-2)}
/* footer checkbox */
.chk{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:12px;color:var(--txt-1);margin-right:auto}
.chk .box{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--line-bright);display:grid;place-items:center;color:transparent;flex:0 0 17px}
.chk.on .box{background:var(--accent);border-color:var(--accent);color:#1a0c06}
.chk:hover .box{border-color:var(--accent-line)}
/* busy list in no-idle modal */
.busy-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.busy-item{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--bg-1);padding:8px 11px}
.busy-item .wk-badge{width:24px;height:24px;flex:0 0 24px;font-size:9.5px}
.busy-item .nm{font-size:12px;color:var(--txt-0);flex:1}

/* ---------- DelegationCard (inline transcript) ---------- */
.dcard{border:1px solid var(--line);border-radius:var(--r-md);background:var(--bg-2);margin:11px 0;overflow:hidden}
.dcard.live{border-color:var(--accent-line)}
.dcard-h{display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer}
.dcard-h:hover{background:var(--bg-3)}
.dcard-badge{width:28px;height:28px;flex:0 0 28px;border-radius:var(--r-sm);border:1px solid var(--line-bright);background:var(--bg-1);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:10px}
.dcard-ti{flex:1;min-width:0}
.dcard-t{font-size:12.5px;color:var(--txt-0);font-weight:500}
.dcard-t b{font-weight:600}
.dcard-sub{font-family:var(--mono);font-size:10px;color:var(--txt-2);margin-top:2px}
.dcard-st{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line);flex:0 0 auto}
.dcard-st.sent{color:var(--info);border-color:rgba(91,155,255,.3);background:rgba(91,155,255,.06)}
.dcard-st.running{color:var(--accent);border-color:var(--accent-line);background:var(--accent-dim)}
.dcard-st.ready{color:var(--ok);border-color:rgba(52,211,166,.3);background:rgba(52,211,166,.06)}
.dcard-st.error{color:var(--err);border-color:rgba(255,77,94,.3);background:rgba(255,77,94,.06)}
.dcard-body{border-top:1px solid var(--line-soft);padding:12px 13px;background:var(--bg-1)}
.dcard-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-2);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.dcard-prompt{font-size:12px;color:var(--txt-1);line-height:1.55;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:9px 11px}
.dcard-tr{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--info);margin-left:auto}
.dcard-report{font-size:12.5px;color:var(--txt-0);line-height:1.6;background:rgba(52,211,166,.05);border:1px solid rgba(52,211,166,.2);border-radius:var(--r-sm);padding:10px 12px;margin-top:11px}
.dcard-err{font-family:var(--mono);font-size:11px;color:var(--err);line-height:1.55;background:rgba(255,77,94,.05);border:1px solid rgba(255,77,94,.2);border-radius:var(--r-sm);padding:10px 12px;margin-top:11px}
.dcard-foot{display:flex;align-items:center;gap:9px;margin-top:12px}
.dcard-link{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;color:var(--txt-1);cursor:pointer;background:none;border:0;padding:0}
.dcard-link:hover{color:var(--accent)}
.dcard-foot .sp{flex:1}

/* report inbox bar (near composer) */
.rib{display:flex;align-items:center;gap:11px;max-width:1240px;margin:0 auto 9px;padding:9px 14px;border:1px solid var(--accent-line);border-radius:var(--r-md);background:var(--accent-dim)}
.rib-ic{color:var(--accent);display:flex}
.rib-l{font-size:12px;color:var(--txt-0)}
.rib-l b{color:var(--accent);font-weight:600}
.rib-count{font-family:var(--mono);font-size:10px;color:var(--accent);border:1px solid var(--accent-line);border-radius:20px;padding:2px 8px}
.rib .sp{flex:1}
.rib-btn{display:flex;align-items:center;gap:7px;background:var(--accent);border:0;color:#1a0c06;font-family:var(--sans);font-weight:600;font-size:12px;padding:7px 13px;border-radius:var(--r-sm);cursor:pointer}
.rib-btn:hover{background:var(--accent-bright)}
.rib-btn svg{stroke:#1a0c06}
.rib-ghost{background:none;border:0;color:var(--txt-2);cursor:pointer;font-family:var(--mono);font-size:10.5px;padding:5px 8px;border-radius:var(--r-sm)}
.rib-ghost:hover{color:var(--txt-0)}

/* delegate button in msg-actions */
.msg-actions .delegate-btn{width:auto;gap:7px;padding:0 11px;font-family:var(--sans);font-size:11.5px;font-weight:500;color:var(--accent);border:1px solid var(--accent-line)!important;border-radius:var(--r-sm);margin-left:4px}
.msg-actions .delegate-btn:hover{background:var(--accent-dim);color:var(--accent)}
.set-select{display:flex;align-items:center;gap:8px;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);padding:8px 11px;font-family:var(--mono);font-size:11px;color:var(--txt-0);cursor:pointer;min-width:180px;position:relative}
.set-select:hover{border-color:var(--line-bright)}
.set-select .cv{flex:1}
.set-select svg{stroke:var(--txt-2)}

/* stepper */
.stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--bg-1)}
.stepper button{width:30px;height:32px;background:none;border:0;color:var(--txt-1);font-size:16px;cursor:pointer}
.stepper button:hover{background:var(--bg-4);color:var(--txt-0)}
.stepper .val{width:42px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--txt-0)}

/* accent swatches */
.sw-row{display:flex;gap:9px}
.sw{width:30px;height:30px;border-radius:var(--r-sm);cursor:pointer;border:2px solid transparent;position:relative}
.sw.sel{border-color:var(--txt-0)}
.sw.sel::after{content:'';position:absolute;inset:0;border-radius:2px;box-shadow:0 0 0 2px var(--bg-2) inset}

.set-foot{display:flex;align-items:center;gap:12px;margin-top:30px;padding-top:18px;border-top:1px solid var(--line-soft)}
.set-foot .lbl{font-size:10px}
.danger-btn{background:rgba(255,77,94,.08);border:1px solid rgba(255,77,94,.3);color:var(--err);font-family:var(--sans);font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--r-md);cursor:pointer}
.danger-btn:hover{background:var(--err);color:#fff}

/* ---------- Generic view header ---------- */
.view-head{height:44px;flex:0 0 44px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--line-soft)}
.view-head .ttl{font-size:13px;font-weight:600;color:var(--txt-0);white-space:nowrap}
.view-head .lbl{margin-left:2px}
.view-scroll{flex:1;overflow-y:auto;min-height:0}

/* ---------- Orchestrator ---------- */
.orch-page{max-width:1320px;margin:0 auto;padding:18px 40px 50px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:8px}
.kpi{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--bg-2);padding:14px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent-line)}
.kpi.run::before{background:var(--run)}
.kpi.wait::before{background:var(--warn)}
.kpi.done::before{background:var(--ok)}
.kpi.err::before{background:var(--err)}
.kpi.fleet::before{background:linear-gradient(180deg,var(--accent),transparent)}
.kpi .k-lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-2);display:flex;align-items:center;gap:6px}
.kpi .k-val{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--txt-0);margin-top:8px;line-height:1;display:flex;align-items:baseline;gap:6px}
.kpi .k-val small{font-size:12px;color:var(--txt-2);font-weight:400}
.kpi .k-sub{font-family:var(--mono);font-size:10px;color:var(--txt-2);margin-top:6px}
.kpi.run .k-val{color:var(--accent)}

.orch-sec{margin-top:26px}
.orch-sec-h{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.orch-sec-h .lbl{flex-shrink:0}
.orch-sec-h .rule{flex:1;height:1px;background:var(--line-soft)}
.orch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px}

.ocard{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--bg-2);overflow:hidden;cursor:pointer;transition:border-color .14s,transform .14s;position:relative;display:flex;flex-direction:column}
.ocard:hover{border-color:var(--line-bright);transform:translateY(-1px)}
.ocard.live{border-color:var(--accent-line)}
.ocard.live::after{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%)}
.ocard.dim{opacity:.86}
.ocard-head{display:flex;align-items:center;gap:11px;padding:13px 14px 10px}
.ocard-badge{width:32px;height:32px;flex:0 0 32px;border-radius:var(--r-sm);border:1px solid var(--line-bright);background:var(--bg-1);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:12px;color:var(--accent)}
.ocard-id{flex:1;min-width:0}
.ocard-ag{font-size:12px;font-weight:600;color:var(--txt-0)}
.ocard-model{font-family:var(--mono);font-size:9.5px;color:var(--txt-2);letter-spacing:.03em;margin-top:1px}
.ocard-st{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase}
.ocard-body{padding:0 14px 12px;flex:1}
.ocard-task{font-size:13px;color:var(--txt-0);font-weight:500;line-height:1.4;margin-bottom:8px}
.ocard-meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;color:var(--txt-2);margin-bottom:10px}
.ocard-meta .br{display:flex;align-items:center;gap:4px;min-width:0}
.ocard-meta .br span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ocard-act{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;padding:8px 10px;border-radius:var(--r-sm);background:var(--bg-1);border:1px solid var(--line-soft);min-height:34px}
.ocard-act.run{color:var(--accent)}
.ocard-act.wait{color:var(--warn)}
.ocard-act.done{color:var(--ok)}
.ocard-act.err{color:var(--err)}
.ocard-act span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dbar{height:5px;border-radius:3px;background:var(--bg-4);overflow:hidden;display:flex;margin:11px 0 7px}
.dbar i{height:100%}
.dbar .a{background:var(--add)}
.dbar .d{background:var(--del)}
.dbar-meta{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:10px}
.ocard-foot{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--line-soft);background:var(--bg-1)}
.ocard-foot .tk{font-family:var(--mono);font-size:10px;color:var(--txt-2);display:flex;align-items:center;gap:5px}
.ocard-foot .sp{flex:1}
.mini-btn{display:flex;align-items:center;gap:6px;font-family:var(--sans);font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--line);background:var(--bg-3);color:var(--txt-1)}
.mini-btn:hover{border-color:var(--line-bright);color:var(--txt-0)}
.mini-btn.accent{background:var(--accent-dim);border-color:var(--accent-line);color:var(--accent)}
.mini-btn.accent:hover{background:var(--accent);color:#1a0c06}
.mini-btn.accent:hover svg{stroke:#1a0c06}
.indet{height:5px;border-radius:3px;background:var(--bg-4);overflow:hidden;margin:11px 0 7px;position:relative}
.indet::after{content:'';position:absolute;top:0;bottom:0;width:38%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:indet 1.5s ease-in-out infinite}
@keyframes indet{0%{left:-40%}100%{left:100%}}

/* ---------- Activity History ---------- */
.hist-bar{display:flex;align-items:center;gap:10px;padding:12px 0;max-width:1240px;margin:0 auto;width:100%}
.hist-search{display:flex;align-items:center;gap:8px;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--r-md);padding:7px 11px;width:230px}
.hist-search input{background:none;border:0;outline:none;color:var(--txt-0);font-family:var(--sans);font-size:12.5px;width:100%}
.hist-search input::placeholder{color:var(--txt-2)}
.hist-search svg{stroke:var(--txt-2)}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--txt-1);background:var(--bg-3);border:1px solid var(--line);border-radius:20px;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--line-bright);color:var(--txt-0)}
.chip.on{background:var(--accent-dim);border-color:var(--accent-line);color:var(--accent)}
.chip .badge-mini{font-weight:600}
.chip-group{display:flex;gap:6px}
.hist-page{max-width:1240px;margin:0 auto;padding:0 40px 50px}
.hist-day{display:flex;align-items:center;gap:12px;margin:18px 0 6px}
.hist-day .d{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-2)}
.hist-day .rule{flex:1;height:1px;background:var(--line-soft)}
.hist-day .ct{font-family:var(--mono);font-size:10px;color:var(--txt-3)}
.hist-feed{display:flex;flex-direction:column}
.hrow{display:flex;align-items:center;gap:13px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;position:relative}
.hrow:hover{background:var(--bg-2)}
.hrow .time{font-family:var(--mono);font-size:10.5px;color:var(--txt-2);width:62px;flex:0 0 62px;text-align:right}
.hrow .badge-mini{width:24px;height:24px;flex:0 0 24px;border-radius:5px;border:1px solid var(--line-bright);background:var(--bg-2);display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:9.5px;color:var(--accent)}
.hrow .ev-ico{width:26px;height:26px;flex:0 0 26px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line)}
.hrow .ev-ico.ok{color:var(--ok);border-color:rgba(52,211,166,.3)}
.hrow .ev-ico.run{color:var(--accent);border-color:var(--accent-line)}
.hrow .ev-ico.wait{color:var(--warn);border-color:rgba(245,181,49,.3)}
.hrow .ev-ico.err{color:var(--err);border-color:rgba(255,77,94,.3)}
.hrow .ev-ico.info{color:var(--info);border-color:rgba(91,155,255,.3)}
.hrow .txt{flex:1;min-width:0;font-size:12.5px;color:var(--txt-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow .txt b{color:var(--txt-0);font-weight:600}
.hrow .txt code{font-family:var(--mono);font-size:11px;color:var(--txt-1)}
.hrow .tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid var(--line);color:var(--txt-2);flex:0 0 auto}
.hrow .tag.ok{color:var(--ok);border-color:rgba(52,211,166,.3);background:rgba(52,211,166,.06)}
.hrow .tag.run{color:var(--accent);border-color:var(--accent-line);background:var(--accent-dim)}
.hrow .tag.wait{color:var(--warn);border-color:rgba(245,181,49,.3);background:rgba(245,181,49,.06)}
.hrow .tag.err{color:var(--err);border-color:rgba(255,77,94,.3);background:rgba(255,77,94,.06)}
.hrow .tag.info{color:var(--info);border-color:rgba(91,155,255,.3);background:rgba(91,155,255,.06)}
.hist-empty{text-align:center;padding:50px;font-family:var(--mono);font-size:12px;color:var(--txt-2)}

/* ---------- Scheduled ---------- */
.sched-page{max-width:940px;margin:0 auto;padding:18px 40px 50px}
.sched-card{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--bg-2);padding:14px 16px}
.sched-card + .sched-card{margin-top:10px}
.sched-ico{width:36px;height:36px;flex:0 0 36px;border-radius:var(--r-sm);border:1px solid var(--line-bright);background:var(--bg-1);display:grid;place-items:center;color:var(--accent)}
.sched-main{flex:1;min-width:0}
.sched-t{font-size:13px;font-weight:500;color:var(--txt-0)}
.sched-d{font-family:var(--mono);font-size:10.5px;color:var(--txt-2);margin-top:3px;display:flex;align-items:center;gap:10px}
.sched-next{font-family:var(--mono);font-size:10.5px;color:var(--accent);text-align:right}
.sched-next small{display:block;color:var(--txt-2);font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}

/* mini activity sparkline for running rows */
.spark{display:flex;align-items:flex-end;gap:1px;height:9px}
.spark i{width:2px;background:var(--accent);opacity:.55;border-radius:1px;animation:bar 1.1s ease-in-out infinite}
@keyframes bar{0%,100%{height:2px}50%{height:9px}}
</style>
</head>
